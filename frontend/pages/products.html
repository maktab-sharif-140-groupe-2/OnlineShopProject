<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Online Shop</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div class="page-content">
    <div class="page-header">
      <h2>Products</h2>
      <a href="/pages/product-create.html" class="btn btn-primary">+ Add Product</a>
    </div>
    <div class="card">
      <div class="card-body" id="products-container">
        <div class="loading"><div class="spinner"></div><span>Loading products...</span></div>
      </div>
      <div class="card-footer" id="pagination-container"></div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-price">
    <div class="modal">
      <div class="modal-header">
        <h3>Update Price</h3>
        <button data-close-modal class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="price-alert"></div>
        <p class="mb-1">Product: <strong id="price-product-name"></strong></p>
        <div class="form-group">
          <label for="price-guid">Product ID (GUID)</label>
          <input type="text" id="price-guid" class="form-control" placeholder="Enter product GUID">
        </div>
        <div class="form-group">
          <label for="new-price">New Price ($)</label>
          <input type="number" id="new-price" class="form-control" step="0.01" min="0.01" placeholder="0.00">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-close-modal>Cancel</button>
        <button class="btn btn-primary" id="save-price-btn" data-action="save-price">Save Price</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-delete">
    <div class="modal">
      <div class="modal-header">
        <h3>Confirm Delete</h3>
        <button data-close-modal class="btn-close">&times;</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this product? This action cannot be undone.</p>
        <p class="font-bold mt-1">Product: <span id="delete-product-name"></span></p>
        <div id="delete-alert" class="mt-1"></div>
        <div class="form-group mt-1">
          <label for="delete-guid">Product ID (GUID)</label>
          <input type="text" id="delete-guid" class="form-control" placeholder="Enter product GUID to confirm">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" data-close-modal>Cancel</button>
        <button class="btn btn-danger" id="confirm-delete-btn" data-action="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api/api-client.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components/layout.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/products.js"></script>
</body>
</html>
