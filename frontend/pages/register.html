<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Online Shop</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/responsive.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--color-bg)}
    .auth-container{width:100%;max-width:480px;padding:1rem}
    .auth-card{background:var(--color-surface);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:2rem}
    .auth-card h2{text-align:center;margin-bottom:.5rem}
    .auth-card .subtitle{text-align:center;color:var(--color-text-secondary);font-size:.875rem;margin-bottom:1.5rem}
    .auth-footer{text-align:center;margin-top:1rem;font-size:.875rem;color:var(--color-text-secondary)}
    .auth-footer a{color:var(--color-primary);font-weight:600}
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Fill in the details to create your account</p>
      <div id="alert-box"></div>
      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="FullName" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="age">Age</label>
            <input type="number" id="age" name="Age" class="form-control" placeholder="25" min="1" max="150" required>
          </div>
          <div class="form-group">
            <label for="phoneNumber">Phone Number</label>
            <input type="tel" id="phoneNumber" name="PhoneNumber" class="form-control" placeholder="+1234567890" required>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="Email" class="form-control" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="Password" class="form-control" placeholder="Min 8 characters" required>
          <div class="hint">Must contain uppercase, lowercase, and a digit. Min 8 characters.</div>
        </div>
        <button type="submit" class="btn btn-primary mt-1 w-full" id="register-btn">Create Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="/pages/login.html">Sign in</a>
      </div>
      <div class="text-center mt-1">
        <a href="/index.html" class="text-muted text-sm">Back to Dashboard</a>
      </div>
    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/api/api-client.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components/layout.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/register.js"></script>
</body>
</html>
