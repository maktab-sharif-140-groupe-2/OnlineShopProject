<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Product - Online Shop</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div class="page-content">
    <div class="page-header">
      <h2>Add New Product</h2>
    </div>
    <div class="card max-w-md">
      <div class="card-body">
        <div id="form-alert"></div>
        <form id="product-form" novalidate>
          <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" name="Name" class="form-control" placeholder="e.g. Wireless Mouse" maxlength="100" required>
          </div>
          <div class="form-group">
            <label for="brandName">Brand Name</label>
            <input type="text" id="brandName" name="BrandName" class="form-control" placeholder="e.g. Logitech" maxlength="100" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="stock">Stock Quantity</label>
              <input type="number" id="stock" name="Stock" class="form-control" min="1" max="1000000" placeholder="100" required>
            </div>
            <div class="form-group">
              <label for="price">Price ($)</label>
              <input type="number" id="price" name="Price" class="form-control" step="0.01" min="0.01" placeholder="29.99" required>
            </div>
          </div>
          <div class="flex-row mt-2">
            <button type="submit" class="btn btn-primary" id="submit-btn">Create Product</button>
            <a href="pages/products.html" class="btn btn-outline">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script src="../js/config.js"></script>
  <script src="../js/api/api-client.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/components/layout.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/pages/product-create.js"></script>
</body>
</html>
